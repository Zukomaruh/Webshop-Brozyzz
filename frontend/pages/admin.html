<!DOCTYPE html>
<html lang="de">
<head>
    <script src="../components/header.js"></script>
    <title>Admin-Bereich</title>
</head>
<body style="display:none;">
<div class="container mt-2">
    <h1 class="mb-4">Hallo Admin</h1>
    <button id="btnShowProductList" class="btn btn-primary">Produktliste</button>
    <button id="btnShowAddProduct" class="btn btn-outline-primary ms-2">Produkt anlegen</button>
</div>

<div id="addProductView" class="container mt-2" style="display:none;">
    <div class="alert alert-info">Hier kannst du neue Produkte anlegen.</div>
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-4">Neues Produkt</h3>

            <form id="createProductForm" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="productName" class="form-label">Produktname</label>
                    <input type="text" class="form-control" id="productName" name="name" required>
                </div>

                <div class="mb-3">
                    <label for="productDescription" class="form-label">Beschreibung</label>
                    <textarea class="form-control" id="productDescription" name="description" rows="4" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="productPrice" class="form-label">Preis</label>
                    <input type="number" class="form-control" id="productPrice" name="price" step="0.01" min="0" required>
                </div>

                <!-- Dropdown Menü mit provisorischen Kategorien, würde auch mit Texteingabefeld gehen... -->
                <div class="mb-3">
                    <label for="productCategory" class="form-label">Kategorie</label>
                    <select class="form-control" id="productCategory" name="category" required>
                        <option value="">Bitte wählen</option>
                        <option value="Supplements">Supplements</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Equipment">Equipment</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="productRating" class="form-label">Bewertung (1-5)</label>
                    <input type="number" class="form-control" id="productRating" name="rating" min="1" max="5" required>
                </div>

                <div class="mb-3">
                    <label for="productImage" class="form-label">Produktbild</label>
                    <input type="file" class="form-control" id="productImage" name="image" accept=".jpg,.jpeg,.png,.webp" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Produkt anlegen</button>
            </form>

            <div id="productMessage" class="mt-3 text-center"></div>
        </div>
    </div>
</div>
<div id="productListView" class="container mt-2">
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Picture</th>
            <th>Description</th>
            <th>Price</th>
            <th>Category</th>
            <th>Rating</th>
            <th>Aktionen</th>
        </tr>
        </thead>
        <tbody id="productTableBody">
        <!-- wird per JS befüllt -->
        </tbody>
    </table>
</div>

<!--Scripte:-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../assets/js/admin.js"></script>
<script src="../components/navbar.js"></script>
<script src="../assets/js/authGuard.js"></script>
</body>
</html>
